name: CI Gradle

on:
  push:
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Show current directory
        run: pwd

      - name: List files
        run: ls -la

      # =========================
      # TESTS + COVERAGE
      # =========================
      - name: Run tests + JaCoCo
        run: ./gradlew test testIntegration jacocoTestReport
  # =========================
  # TEST REPORT (JUnit)
  # =========================
      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests Report
          path: "**/build/test-results/test/*.xml,**/build/test-results/testIntegration/*.xml"  # ← ajouter
          reporter: java-junit
      # =========================
      # DEBUG (utile pour toi)
      # =========================
      - name: Show test results
        if: always()
        run: find . -name "*.xml"

      # =========================
      # TEST REPORT (JUnit)
      # =========================
      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests Report
          path: "**/build/test-results/test/*.xml"
          reporter: java-junit

      # =========================
      # JACOCO REPORT
      # =========================
      - name: JaCoCo Report
        uses: PavanMudigonda/jacoco-reporter@v5.1
        with:
          coverage_results_path: "**/build/reports/jacoco/test/jacocoTestReport.xml"
          coverage_report_name: Coverage
          coverage_report_title: JaCoCo
          github_token: ${{ secrets.GITHUB_TOKEN }}
          minimum_coverage: 0
          fail_below_threshold: false
          publish_only_summary: false

      # =========================
      # ARTIFACT (HTML REPORT)
      # =========================
      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: "**/build/jacocoHtml"
