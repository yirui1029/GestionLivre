name: CI Gradle

on:
  push:
  pull_request:

permissions:
  contents: read
  checks: write 

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      #  Donner les droits
      - name: Make gradlew executable
        run: chmod +x gradlew

      # Build (sans tests)
      - name: Build project
        run: ./gradlew build -x test

      - name: Run tests + coverage
        working-directory: domain
        run: ./gradlew clean test jacocoTestReport

      - name: Debug coverage file
        run: find . -name jacocoTestReport.xml

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests Report
          path: "**/build/test-results/test/*.xml"
          reporter: java-junit

      - name: Check generated test files
        run: ls -R **/build/test-results || true
      
      - name: JaCoCo Report
        uses: PavanMudigonda/jacoco-reporter@v5.1
        with:
          coverage_results_path: "**/build/reports/jacoco/test/jacocoTestReport.xml"

      - name: Add Jacoco report to summary
        run: |
          echo "| Outcome | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage % | ${{ steps.jacoco_reporter.outputs.coverage_percentage }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Covered lines | ${{ steps.jacoco_reporter.outputs.covered_lines }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Missed lines | ${{ steps.jacoco_reporter.outputs.missed_lines }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Total lines | ${{ steps.jacoco_reporter.outputs.total_lines }} |" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: build/reports/jacoco/test/html
